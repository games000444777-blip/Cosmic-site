<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosmic Clan</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;font-family:'Inter',sans-serif;color:#fff;overflow:hidden;
      background:radial-gradient(circle at top left,rgba(123,44,255,.35),transparent 30%),
                 radial-gradient(circle at bottom right,rgba(0,191,255,.25),transparent 30%),
                 linear-gradient(135deg,#030712,#050816,#02040a);
    }
    .stars{position:fixed;inset:0;z-index:-1}
    .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite ease-in-out}
    @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.7)}}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{
      width:100%;max-width:460px;padding:44px 32px;border-radius:28px;
      background:rgba(255,255,255,.05);backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.45);
      text-align:center;animation:show .6s ease;
    }
    @keyframes show{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    .hidden{display:none}
    .logo{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:5px;color:#8fd3ff;margin-bottom:14px;text-transform:uppercase}
    h1{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,38px);line-height:1.25;margin-bottom:12px}
    h1 span{color:#7fd8ff;text-shadow:0 0 18px rgba(127,216,255,.55)}
    .sub{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:28px}
    .btn{
      width:100%;border:none;cursor:pointer;border-radius:999px;padding:16px 20px;
      color:#fff;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
      background:linear-gradient(90deg,#5b5fff,#8a2be2,#00c2ff);background-size:200% 200%;
      animation:grad 4s linear infinite;
      box-shadow:0 10px 30px rgba(0,0,0,.35),0 0 24px rgba(111,167,255,.25);transition:.25s;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .field{text-align:left;margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .input{
      width:100%;padding:14px 15px;border-radius:14px;
      border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);
      color:#fff;outline:none;font-size:15px;font-family:'Inter',sans-serif;
    }
    .input:focus{border-color:rgba(127,216,255,.5);box-shadow:0 0 18px rgba(127,216,255,.12)}
    .msg{margin-top:16px;min-height:22px;font-size:14px;font-weight:600}
    .msg.ok{color:#4ade80}.msg.err{color:#ff6b6b}.msg.wait{color:#8fd3ff}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="wrap">

    <div class="card" id="page1">
      <div class="logo">COSMIC CLAN</div>
      <h1>Добро пожаловать на сайт <span>Cosmic</span></h1>
      <p class="sub">Официальная регистрация участников клана Mine Evo</p>
      <button class="btn" onclick="goNext()">Продолжить</button>
    </div>

    <div class="card hidden" id="page2">
      <div class="logo">РЕГИСТРАЦИЯ</div>
      <h1>Вступить в <span>Cosmic</span></h1>
      <p class="sub">Введите данные аккаунта Mine Evo</p>
      <div class="field">
        <label>Ник в Mine Evo</label>
        <input class="input" id="nickname" type="text" placeholder="Например: Light" autocomplete="off">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input class="input" id="password" type="password" placeholder="Минимум 4 символа">
      </div>
      <button class="btn" id="regBtn" onclick="registerUser()">Зарегистрироваться</button>
      <div class="msg" id="msg"></div>
    </div>

  </div>

  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 180; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      const size = Math.random() * 2 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.animationDuration = (Math.random() * 3 + 2) + 's';
      s.style.animationDelay = (Math.random() * 5) + 's';
      starsEl.appendChild(s);
    }

    function goNext() {
      document.getElementById('page1').classList.add('hidden');
      document.getElementById('page2').classList.remove('hidden');
    }

    async function registerUser() {
      const nick = document.getElementById('nickname').value.trim();
      const pass = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('regBtn');

      if (!nick || !pass) {
        msg.className = 'msg err';
        msg.textContent = '❌ Заполни все поля';
        return;
      }
      if (pass.length < 4) {
        msg.className = 'msg err';
        msg.textContent = '❌ Пароль минимум 4 символа';
        return;
      }

      btn.disabled = true;
      msg.className = 'msg wait';
      msg.textContent = '⏳ Отправляю запрос...';

      try {
        const API = "https://talented-caribou-69877.upstash.io";
        const TOKEN = "gQAAAAAAARD1AAIncDE2Yjk4NGJkM2ViZTI0YTkyOTM2MTM4NzY0MzY1ODM5MHAxNjk4Nzc";

        async function redis(cmd, ...args) {
          const res = await fetch(`${API}/${cmd}/${args.map(encodeURIComponent).join('/')}`, {
            headers: { Authorization: `Bearer ${TOKEN}` }
          });
          const data = await res.json();
          return data.result;
        }

        const existing = await redis('GET', `req:${nick.toLowerCase()}`);
        if (existing === 'approved') {
          msg.className = 'msg err';
          msg.textContent = '❌ Этот ник уже зарегистрирован';
          btn.disabled = false;
          return;
        }

        await redis('SET', `req:${nick.toLowerCase()}`, 'pending');
        await redis('LPUSH', 'queue', nick.toLowerCase());

        msg.textContent = '⏳ Проверяю ник в клане Cosmic...';

        let tries = 0;
        const timer = setInterval(async () => {
          tries++;
          const status = await redis('GET', `req:${nick.toLowerCase()}`);

          if (status === 'approved') {
            clearInterval(timer);
            msg.className = 'msg ok';
            msg.textContent = '✅ Ник найден в клане! Добро пожаловать в Cosmic!';
          } else if (status === 'rejected') {
            clearInterval(timer);
            msg.className = 'msg err';
            msg.textContent = '❌ Твоего ника нет в клане Cosmic';
            btn.disabled = false;
          } else if (tries >= 24) {
            clearInterval(timer);
            msg.className = 'msg err';
            msg.textContent = '❌ Время вышло, попробуй снова';
            btn.disabled = false;
          }
        }, 5000);

      } catch(e) {
        msg.className = 'msg err';
        msg.textContent = '❌ Ошибка соединения';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
